<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <rect width="800" height="320" rx="12" fill="#09090b"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a1a1aa" font-weight="600" letter-spacing="2">FEATURES</text>

  <!-- Feature cards with staggered fade-in -->
  <!-- Card 1: Components -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.3s"/>
    <rect x="30" y="55" width="170" height="115" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="115" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#22d3ee">30</text>
    <text x="115" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#71717a">Components</text>
    <text x="115" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">DNS, CDN, LB, Cache,</text>
    <text x="115" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">Redis, Kafka, SQL, NoSQL</text>
    <text x="115" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#06b6d4">+ Custom renamable</text>
  </g>

  <!-- Card 2: Problems -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.6s"/>
    <rect x="220" y="55" width="170" height="115" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="305" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#a78bfa">35</text>
    <text x="305" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#71717a">Design Problems</text>
    <text x="305" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">Twitter, Netflix, Uber,</text>
    <text x="305" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">WhatsApp, YouTube, Kafka</text>
    <text x="305" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa">Easy to Expert tiers</text>
  </g>

  <!-- Card 3: Scoring -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.9s"/>
    <rect x="410" y="55" width="170" height="115" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="495" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#22c55e">5</text>
    <text x="495" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#71717a">Score Categories</text>
    <text x="495" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">Scalability, Availability,</text>
    <text x="495" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">Latency, Cost, Trade-offs</text>
    <text x="495" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#22c55e">100-point rubric</text>
  </g>

  <!-- Card 4: Interview Mode -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1.2s"/>
    <rect x="600" y="55" width="170" height="115" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="685" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#f59e0b">45</text>
    <text x="685" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#71717a">min</text>
    <text x="685" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#71717a">Interview Mode</text>
    <text x="685" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">6-phase guided flow</text>
    <text x="685" y="151" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">with countdown timer</text>
    <text x="685" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">Like a real interview</text>
  </g>

  <!-- Second row -->
  <!-- Card 5: Edge Labels -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1.5s"/>
    <rect x="80" y="190" width="190" height="105" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <line x1="110" y1="220" x2="200" y2="220" stroke="#3f3f46" stroke-width="2"/>
    <text x="155" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#22d3ee">HTTP sync</text>
    <line x1="110" y1="245" x2="200" y2="245" stroke="#3f3f46" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="155" y="241" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b">pub/sub async</text>
    <text x="175" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa" font-weight="500">Edge Labels</text>
    <text x="175" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">Protocol + sync/async</text>
  </g>

  <!-- Card 6: Save/Export -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1.8s"/>
    <rect x="305" y="190" width="190" height="105" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="400" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="#71717a">Ctrl+S  Save</text>
    <text x="400" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#71717a">Ctrl+E  Export PNG</text>
    <text x="400" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#71717a">Ctrl+O  Load</text>
    <text x="400" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa" font-weight="500">Save, Load, Export</text>
  </g>

  <!-- Card 7: Learn -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="2.1s"/>
    <rect x="530" y="190" width="190" height="105" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="625" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#22c55e">When to use</text>
    <text x="625" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">Trade-offs</text>
    <text x="625" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#22d3ee">Interview tips</text>
    <text x="625" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a78bfa">Real-world examples</text>
    <text x="625" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa" font-weight="500">Concept Library</text>
  </g>
</svg>
